<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change password — Ledger</title>
  <link rel="stylesheet" href="../../../design-system/assets/tokens.css">
  <link rel="stylesheet" href="../../../design-system/assets/components.css">
  <link rel="stylesheet" href="../assets/app.css">
  <script defer src="../../../design-system/assets/aurora.js"></script>
</head>
<body class="app-body">

  <div class="app-frame">
    <!-- status bar -->
    <div class="app-statusbar">
      <span>9:41</span>
      <span class="app-statusbar-right">
        <svg class="au-icon" style="width:15px"><use href="#i-activity"></use></svg>
        <svg class="au-icon" style="width:15px"><use href="#i-droplet"></use></svg>
        <span class="au-mono" style="font-size:11px">100%</span>
      </span>
    </div>

    <div class="app-screen">
      <!-- header -->
      <div class="app-header">
        <div class="au-row-flex au-gap-2">
          <a class="au-icon-btn au-icon-btn--sm" href="settings.html" aria-label="Back"><svg class="au-icon"><use href="#i-chevron-left"></use></svg></a>
          <div class="app-header-title" style="font-size:var(--text-lg)">Change password</div>
        </div>
      </div>

      <div class="app-scroll" style="display:flex;flex-direction:column;min-height:100%">

        <!-- intro -->
        <div class="au-row-flex au-gap-4 au-rise au-rise-1" style="margin:var(--space-2) 0 var(--space-6)">
          <span class="set-row-icon" style="width:48px;height:48px;background:var(--brand-subtle);color:var(--brand-strong)"><svg class="au-icon" style="width:24px"><use href="#i-shield"></use></svg></span>
          <div>
            <div style="font-weight:var(--weight-semibold)">Keep your ledger secure</div>
            <div class="au-caption">Choose a fresh password you don't use elsewhere.</div>
          </div>
        </div>

        <div class="au-stack au-stack-6 au-rise au-rise-2">
          <!-- current password -->
          <div class="au-field">
            <label class="au-label" for="cp-current">Current password</label>
            <div class="au-input-wrap">
              <svg class="au-icon"><use href="#i-lock"></use></svg>
              <input class="au-input" id="cp-current" type="password" value="············" autocomplete="current-password">
              <button class="au-icon-btn au-icon-btn--sm" type="button" aria-label="Show password" style="margin-right:calc(var(--space-2) * -1)"><svg class="au-icon"><use href="#i-eye"></use></svg></button>
            </div>
          </div>

          <!-- new password -->
          <div class="au-field is-success">
            <label class="au-label" for="cp-new">New password</label>
            <div class="au-input-wrap">
              <svg class="au-icon"><use href="#i-lock"></use></svg>
              <input class="au-input" id="cp-new" type="password" value="··············" autocomplete="new-password">
              <button class="au-icon-btn au-icon-btn--sm" type="button" aria-label="Show password" style="margin-right:calc(var(--space-2) * -1)"><svg class="au-icon"><use href="#i-eye-off"></use></svg></button>
            </div>
            <!-- strength meter -->
            <div class="au-row-flex au-gap-2" style="margin-top:var(--space-1)">
              <span style="flex:1;height:4px;border-radius:var(--radius-pill);background:var(--good)"></span>
              <span style="flex:1;height:4px;border-radius:var(--radius-pill);background:var(--good)"></span>
              <span style="flex:1;height:4px;border-radius:var(--radius-pill);background:var(--good)"></span>
              <span style="flex:1;height:4px;border-radius:var(--radius-pill);background:var(--surface-3)"></span>
            </div>
            <p class="au-help" style="color:var(--good-text)"><svg class="au-icon" style="width:14px"><use href="#i-check-circle"></use></svg> Strong — 14 characters, mixed case &amp; a symbol.</p>
          </div>

          <!-- confirm password -->
          <div class="au-field is-success">
            <label class="au-label" for="cp-confirm">Confirm new password</label>
            <div class="au-input-wrap">
              <svg class="au-icon"><use href="#i-lock"></use></svg>
              <input class="au-input" id="cp-confirm" type="password" value="··············" autocomplete="new-password">
              <svg class="au-icon" style="color:var(--good)"><use href="#i-check-circle"></use></svg>
            </div>
            <p class="au-help" style="color:var(--good-text)"><svg class="au-icon" style="width:14px"><use href="#i-check"></use></svg> Passwords match.</p>
          </div>
        </div>

        <!-- requirements -->
        <div class="au-banner au-banner--info au-rise au-rise-3" style="margin-top:var(--space-6)">
          <svg class="au-icon"><use href="#i-info"></use></svg>
          <div class="au-banner-body">
            <div class="au-banner-text">Use at least 8 characters with a mix of letters, numbers, and symbols.</div>
          </div>
        </div>

        <!-- actions -->
        <div class="au-stack au-stack-3" style="margin-top:auto;padding-top:var(--space-7)">
          <button class="au-btn au-btn--primary au-btn--lg au-btn--block" type="button" data-toast="Password updated" data-toast-type="success"><svg class="au-icon"><use href="#i-check"></use></svg> Save new password</button>
          <a class="au-btn au-btn--text au-btn--block" href="settings.html">Cancel</a>
        </div>

        <div style="height:var(--space-4)"></div>
      </div>
    </div>
  </div>

</body>
</html>
