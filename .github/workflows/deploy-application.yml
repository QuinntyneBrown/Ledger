name: Deploy Ledger Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ledger-application-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Migrate database and deploy application
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build authenticated application
        working-directory: frontend
        run: npm run build:app

      - name: Restore .NET dependencies and tools
        run: |
          dotnet tool restore
          dotnet restore backend/Ledger.slnx

      - name: Publish API
        run: dotnet publish backend/src/Ledger.Api/Ledger.Api.csproj --configuration Release --no-restore --output "${{ runner.temp }}/publish"

      - name: Add authenticated application to API package
        shell: bash
        run: |
          mkdir -p "${{ runner.temp }}/publish/wwwroot"
          cp -R frontend/dist/ledger-app/browser/. "${{ runner.temp }}/publish/wwwroot/"
          cd "${{ runner.temp }}/publish"
          zip -qr "${{ runner.temp }}/ledger-app.zip" .

      - name: Build database migration bundle
        run: >-
          dotnet tool run dotnet-ef migrations bundle
          --project backend/src/Ledger.Infrastructure/Ledger.Infrastructure.csproj
          --startup-project backend/src/Ledger.Api/Ledger.Api.csproj
          --configuration Release
          --self-contained
          --target-runtime linux-x64
          --output "${{ runner.temp }}/ledger-migrations"

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Apply database migrations
        shell: bash
        env:
          LEDGER_SQL_CONNECTION_STRING: ${{ secrets.LEDGER_SQL_CONNECTION_STRING }}
        run: |
          set -euo pipefail
          runner_ip="$(curl --fail --silent --show-error https://api.ipify.org)"
          rule_name="github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            az sql server firewall-rule delete \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --server "${{ vars.AZURE_SQL_SERVER_NAME }}" \
              --name "$rule_name" \
              --only-show-errors >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          az sql server firewall-rule create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --server "${{ vars.AZURE_SQL_SERVER_NAME }}" \
            --name "$rule_name" \
            --start-ip-address "$runner_ip" \
            --end-ip-address "$runner_ip" \
            --only-show-errors \
            --output none
          chmod +x "${{ runner.temp }}/ledger-migrations"
          "${{ runner.temp }}/ledger-migrations" --connection "$LEDGER_SQL_CONNECTION_STRING"

      - name: Deploy application package
        run: >-
          az webapp deploy
          --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          --name "${{ vars.AZURE_WEBAPP_NAME }}"
          --src-path "${{ runner.temp }}/ledger-app.zip"
          --type zip
          --clean true
          --restart true
          --only-show-errors
          --output none

      - name: Verify production health
        shell: bash
        run: |
          set -euo pipefail
          app_url="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          for attempt in {1..30}; do
            if curl --fail --silent --show-error "$app_url/health/ready" >/dev/null \
              && curl --fail --silent --show-error "$app_url/" | grep -q '<ledger-root>'; then
              exit 0
            fi
            sleep 10
          done
          echo "Application did not become healthy within five minutes." >&2
          exit 1
