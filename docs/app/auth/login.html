<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Ledger</title>
  <link rel="stylesheet" href="../../../design-system/assets/tokens.css">
  <link rel="stylesheet" href="../../../design-system/assets/components.css">
  <link rel="stylesheet" href="../assets/app.css">
  <script defer src="../../../design-system/assets/aurora.js"></script>
  <style>
    a.au-btn { text-decoration: none; }
    a.au-btn:hover { text-decoration: none; }
    .au-pw-toggle { display: grid; place-items: center; width: 34px; height: 34px; margin-right: -6px; border: none; background: transparent; color: var(--text-lo); border-radius: var(--radius-sm); cursor: pointer; flex: none; transition: background var(--dur-fast), color var(--dur-fast); }
    .au-pw-toggle:hover { background: var(--surface-3); }
    .au-pw-toggle .au-icon { width: 20px; height: 20px; }
    .auth-social { display: flex; flex-direction: column; gap: var(--space-3); }
    .auth-forgot { font-size: var(--text-xs); color: var(--brand); font-weight: var(--weight-semibold); }
  </style>
</head>
<body class="auth-body">

  <div class="auth-card au-card au-card--pad-lg au-rise au-rise-1">
    <div class="auth-logo">
      <div class="auth-mark"></div>
      <div>
        <div class="auth-title">Welcome back</div>
        <div class="auth-sub">Sign in to continue to Ledger</div>
      </div>
    </div>

    <form class="au-stack au-stack-4" onsubmit="return false">
      <!-- Email -->
      <div class="au-field">
        <label class="au-label" for="email">Email</label>
        <div class="au-input-wrap">
          <svg class="au-icon"><use href="#i-mail"></use></svg>
          <input id="email" class="au-input" type="email" value="alex@email.com" placeholder="you@email.com" autocomplete="email" inputmode="email">
        </div>
      </div>

      <!-- Password (error variant shown) -->
      <div class="au-field is-error">
        <div class="au-row-flex au-between">
          <label class="au-label" for="password">Password</label>
          <a class="auth-forgot" href="forgot-password.html">Forgot password?</a>
        </div>
        <div class="au-input-wrap">
          <svg class="au-icon"><use href="#i-lock"></use></svg>
          <input id="password" class="au-input" type="password" value="incorrect" placeholder="Enter your password" autocomplete="current-password">
          <button type="button" class="au-pw-toggle" data-pw-toggle aria-label="Show password">
            <svg class="au-icon"><use href="#i-eye"></use></svg>
          </button>
        </div>
        <p class="au-help is-error"><svg class="au-icon"><use href="#i-alert-circle"></use></svg> Incorrect email or password</p>
      </div>

      <a class="au-btn au-btn--primary au-btn--lg au-btn--block au-mt-2" href="../dashboard/dashboard.html">Sign in</a>
    </form>

    <div class="auth-divider">or</div>

    <div class="auth-social">
      <button type="button" class="au-btn au-btn--outlined au-btn--lg au-btn--block" data-toast="Continuing with Google…" data-toast-type="info">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        Continue with Google
      </button>
      <button type="button" class="au-btn au-btn--outlined au-btn--lg au-btn--block" data-toast="Continuing with Apple…" data-toast-type="info">
        <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true" style="color:var(--text-hi)">
          <path fill="currentColor" d="M17.05 12.04c-.03-2.6 2.12-3.85 2.22-3.91-1.21-1.77-3.09-2.01-3.76-2.04-1.6-.16-3.12.94-3.93.94-.81 0-2.06-.92-3.39-.89-1.74.03-3.35 1.01-4.25 2.57-1.81 3.14-.46 7.79 1.3 10.34.86 1.25 1.89 2.65 3.23 2.6 1.3-.05 1.79-.84 3.36-.84 1.57 0 2.01.84 3.39.81 1.4-.02 2.29-1.27 3.15-2.53.99-1.45 1.4-2.85 1.42-2.93-.03-.01-2.72-1.04-2.75-4.13z"/>
          <path fill="currentColor" d="M14.94 4.54c.72-.87 1.2-2.08 1.07-3.29-1.03.04-2.28.69-3.02 1.56-.66.77-1.24 2-1.09 3.18 1.15.09 2.32-.58 3.04-1.45z"/>
        </svg>
        Continue with Apple
      </button>
    </div>

    <p class="auth-alt">New here? <a href="sign-up.html">Create an account</a></p>
  </div>

  <script>
    document.querySelectorAll("[data-pw-toggle]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var input = btn.closest(".au-input-wrap").querySelector("input");
        var use = btn.querySelector("use");
        var showing = input.type === "text";
        input.type = showing ? "password" : "text";
        use.setAttribute("href", showing ? "#i-eye" : "#i-eye-off");
        btn.setAttribute("aria-label", showing ? "Show password" : "Hide password");
      });
    });
  </script>
</body>
</html>
