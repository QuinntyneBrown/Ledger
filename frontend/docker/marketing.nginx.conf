server { listen 80; root /usr/share/nginx/html; index index.html;
  add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;
  add_header X-Content-Type-Options nosniff always; add_header Referrer-Policy strict-origin-when-cross-origin always; add_header X-Frame-Options DENY always;
  location / { try_files $uri $uri/index.html $uri.html /index.html; }
}
