<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trends — Not enough data — Ledger</title>
  <link rel="stylesheet" href="../../../design-system/assets/tokens.css">
  <link rel="stylesheet" href="../../../design-system/assets/components.css">
  <link rel="stylesheet" href="../assets/app.css">
  <script defer src="../../../design-system/assets/aurora.js"></script>
  <style>
    .empty-chart { position: relative; }
    .empty-chart .au-chart svg { opacity: 0.4; }
    .empty-chart-skeleton line { stroke: var(--viz-grid); stroke-width: 1; }
    .empty-chart-hint {
      position: absolute; inset: 0; display: grid; place-items: center;
      pointer-events: none;
    }
    .empty-chart-hint span {
      font-family: var(--font-mono); font-size: var(--text-2xs); text-transform: uppercase;
      letter-spacing: var(--tracking-wider); color: var(--text-lo);
      background: var(--surface-2); border: 1px solid var(--border);
      padding: var(--space-1) var(--space-3); border-radius: var(--radius-pill);
    }
  </style>
</head>
<body class="app-body">

  <div class="app-frame">
    <div class="app-statusbar">
      <span>9:41</span>
      <span class="app-statusbar-right">
        <svg class="au-icon" style="width:15px"><use href="#i-activity"></use></svg>
        <svg class="au-icon" style="width:15px"><use href="#i-droplet"></use></svg>
        <span class="au-mono" style="font-size:11px">100%</span>
      </span>
    </div>

    <div class="app-screen">
      <!-- header -->
      <div class="app-header">
        <div>
          <div class="app-header-sub">Analytics</div>
          <div class="app-header-title">Trends</div>
        </div>
        <span class="au-icon-btn" aria-hidden="true" style="opacity:0.4"><svg class="au-icon"><use href="#i-list"></use></svg></span>
      </div>

      <div class="app-scroll">
        <!-- FAINT CHART PLACEHOLDER -->
        <section class="au-card trend-chartcard empty-chart au-rise au-rise-1">
          <div class="au-row-flex au-between" style="margin-bottom:var(--space-4)">
            <div class="au-stat">
              <span class="au-stat-label">Current</span>
              <span class="au-stat-value" style="font-size:var(--text-3xl)">74.9<small>kg</small></span>
            </div>
            <span class="au-chip">1 entry</span>
          </div>
          <div class="au-chart">
            <svg viewBox="0 0 640 220" preserveAspectRatio="none" aria-hidden="true">
              <g class="empty-chart-skeleton">
                <line x1="40" y1="20" x2="620" y2="20"></line>
                <line x1="40" y1="70" x2="620" y2="70"></line>
                <line x1="40" y1="120" x2="620" y2="120"></line>
                <line x1="40" y1="170" x2="620" y2="170"></line>
                <line x1="40" y1="200" x2="620" y2="200"></line>
              </g>
              <!-- lonely single data point, no line to draw yet -->
              <line class="au-chart-goal" x1="40" y1="176" x2="620" y2="176"></line>
              <circle cx="120" cy="70" r="5" class="au-chart-dot"></circle>
            </svg>
          </div>
          <div class="empty-chart-hint"><span>Trend appears after 2+ entries</span></div>
        </section>

        <!-- EMPTY STATE -->
        <div class="au-empty au-rise au-rise-2">
          <div class="au-empty-art"><svg class="au-icon"><use href="#i-activity"></use></svg></div>
          <div class="au-empty-title">Not enough data yet</div>
          <p class="au-empty-text">Log a few more days to see your trend. Two or more weigh-ins unlock the chart, moving average and projections.</p>
          <button class="au-btn au-btn--primary au-btn--lg" data-dialog-open="quickWeigh">
            <svg class="au-icon"><use href="#i-plus"></use></svg> Log today's weight
          </button>
          <div class="au-caption">1 of 2 entries needed</div>
          <div class="au-progress au-progress--brand" style="width:180px"><div class="au-progress-bar" style="width:50%"></div></div>
        </div>

        <div style="height:var(--space-4)"></div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="au-bottomnav app-bottomnav">
      <a class="app-rail-brand" href="../dashboard/dashboard.html"><span class="app-rail-mark"></span>Ledger</a>
      <a class="au-navitem" href="../dashboard/dashboard.html"><svg class="au-icon"><use href="#i-home"></use></svg>Home</a>
      <a class="au-navitem is-active" href="trends.html"><svg class="au-icon"><use href="#i-activity"></use></svg>Trends</a>
      <button class="app-navfab" data-dialog-open="quickWeigh" aria-label="Log weight"><svg class="au-icon"><use href="#i-plus"></use></svg></button>
      <a class="au-navitem" href="../milestones/milestones.html"><svg class="au-icon"><use href="#i-trophy"></use></svg>Badges</a>
      <a class="au-navitem" href="../settings/account.html"><svg class="au-icon"><use href="#i-user"></use></svg>Profile</a>
    </nav>
  </div>

  <!-- QUICK WEIGH-IN SHEET -->
  <div class="au-sheet-scrim" id="quickWeigh" hidden>
    <div class="au-sheet" role="dialog" aria-modal="true" aria-label="Log today's weight">
      <div class="au-sheet-grip"></div>
      <div class="au-row-flex au-between" style="margin-bottom:var(--space-2)">
        <div><div class="au-eyebrow">Today</div><div style="font-family:var(--font-mono);color:var(--text-lo);font-size:var(--text-sm)">Wed, Jul 18</div></div>
        <button class="au-icon-btn" data-dialog-close aria-label="Close"><svg class="au-icon"><use href="#i-x"></use></svg></button>
      </div>
      <div class="weigh-stepper" style="margin:var(--space-6) 0">
        <button class="weigh-stepper-btn" aria-label="Decrease"><svg class="au-icon"><use href="#i-minus"></use></svg></button>
        <div class="au-bignum-field">
          <span class="au-bignum" style="width:auto">74.8</span>
          <span class="au-bignum-unit">kg</span>
        </div>
        <button class="weigh-stepper-btn" aria-label="Increase"><svg class="au-icon"><use href="#i-plus"></use></svg></button>
      </div>
      <button class="au-btn au-btn--primary au-btn--lg au-btn--block" data-dialog-close data-toast="Weight logged — 74.8 kg" data-toast-action="Undo">
        <svg class="au-icon"><use href="#i-check"></use></svg> Log weight
      </button>
    </div>
  </div>

</body>
</html>
