<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset your password — Ledger</title>
  <link rel="stylesheet" href="../../../design-system/assets/tokens.css">
  <link rel="stylesheet" href="../../../design-system/assets/components.css">
  <link rel="stylesheet" href="../assets/app.css">
  <script defer src="../../../design-system/assets/aurora.js"></script>
  <style>
    a.au-btn { text-decoration: none; }
    a.au-btn:hover { text-decoration: none; }
    .auth-back { display: inline-flex; align-items: center; gap: var(--space-2); font-size: var(--text-sm); color: var(--text-mid); font-weight: var(--weight-medium); }
    .auth-back .au-icon { width: 16px; height: 16px; }
  </style>
</head>
<body class="auth-body">

  <div class="auth-card au-card au-card--pad-lg au-rise au-rise-1">
    <div class="auth-logo">
      <div class="auth-mark"></div>
      <div>
        <div class="auth-title">Reset your password</div>
        <div class="auth-sub">Enter the email tied to your account and we’ll send a secure link to set a new password.</div>
      </div>
    </div>

    <form class="au-stack au-stack-4" onsubmit="return false">
      <div class="au-field">
        <label class="au-label" for="email">Email</label>
        <div class="au-input-wrap">
          <svg class="au-icon"><use href="#i-mail"></use></svg>
          <input id="email" class="au-input" type="email" value="alex@email.com" placeholder="you@email.com" autocomplete="email" inputmode="email">
        </div>
      </div>

      <button type="button" class="au-btn au-btn--primary au-btn--lg au-btn--block au-mt-2" data-toast="Reset link sent to alex@email.com" data-toast-type="success">
        <svg class="au-icon"><use href="#i-mail"></use></svg> Send reset link
      </button>
    </form>

    <p class="auth-alt">
      <a class="auth-back" href="login.html"><svg class="au-icon"><use href="#i-arrow-left"></use></svg> Back to sign in</a>
    </p>
  </div>

</body>
</html>
