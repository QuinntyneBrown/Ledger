<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set a new password — Ledger</title>
  <link rel="stylesheet" href="../../../design-system/assets/tokens.css">
  <link rel="stylesheet" href="../../../design-system/assets/components.css">
  <link rel="stylesheet" href="../assets/app.css">
  <script defer src="../../../design-system/assets/aurora.js"></script>
  <style>
    a.au-btn { text-decoration: none; }
    a.au-btn:hover { text-decoration: none; }
    .au-pw-toggle { display: grid; place-items: center; width: 34px; height: 34px; margin-right: -6px; border: none; background: transparent; color: var(--text-lo); border-radius: var(--radius-sm); cursor: pointer; flex: none; transition: background var(--dur-fast), color var(--dur-fast); }
    .au-pw-toggle:hover { background: var(--surface-3); }
    .au-pw-toggle .au-icon { width: 20px; height: 20px; }
    .au-help.is-ok { color: var(--good-text); }
    .au-help.is-ok .au-icon { width: 14px; height: 14px; }
  </style>
</head>
<body class="auth-body">

  <div class="auth-card au-card au-card--pad-lg au-rise au-rise-1">
    <div class="auth-logo">
      <div class="auth-mark"></div>
      <div>
        <div class="auth-title">Set a new password</div>
        <div class="auth-sub">Choose a strong password you haven’t used before.</div>
      </div>
    </div>

    <!-- Expired-link variant -->
    <div class="au-banner au-banner--bad" style="margin-bottom:var(--space-5)">
      <svg class="au-icon"><use href="#i-alert-triangle"></use></svg>
      <div class="au-banner-body">
        <div class="au-banner-title">This reset link has expired</div>
        <div class="au-banner-text">For your security, links are valid for 60 minutes. Request a fresh one to continue.</div>
        <a class="au-btn au-btn--sm au-btn--outlined au-mt-4" href="forgot-password.html">
          <svg class="au-icon"><use href="#i-refresh"></use></svg> Request a new link
        </a>
      </div>
    </div>

    <form class="au-stack au-stack-4" onsubmit="return false">
      <!-- New password -->
      <div class="au-field">
        <label class="au-label" for="password">New password</label>
        <div class="au-input-wrap">
          <svg class="au-icon"><use href="#i-lock"></use></svg>
          <input id="password" class="au-input" type="password" value="aurora2026!" placeholder="Create a password" autocomplete="new-password">
          <button type="button" class="au-pw-toggle" data-pw-toggle aria-label="Show password">
            <svg class="au-icon"><use href="#i-eye"></use></svg>
          </button>
        </div>
      </div>

      <!-- Confirm password (match hint) -->
      <div class="au-field is-success">
        <label class="au-label" for="confirm">Confirm password</label>
        <div class="au-input-wrap">
          <svg class="au-icon"><use href="#i-lock"></use></svg>
          <input id="confirm" class="au-input" type="password" value="aurora2026!" placeholder="Re-enter your password" autocomplete="new-password">
          <button type="button" class="au-pw-toggle" data-pw-toggle aria-label="Show password">
            <svg class="au-icon"><use href="#i-eye"></use></svg>
          </button>
        </div>
        <p class="au-help is-ok"><svg class="au-icon"><use href="#i-check-circle"></use></svg> Passwords match</p>
      </div>

      <a class="au-btn au-btn--primary au-btn--lg au-btn--block au-mt-2" href="login.html">Update password</a>
    </form>
  </div>

  <script>
    document.querySelectorAll("[data-pw-toggle]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var input = btn.closest(".au-input-wrap").querySelector("input");
        var use = btn.querySelector("use");
        var showing = input.type === "text";
        input.type = showing ? "password" : "text";
        use.setAttribute("href", showing ? "#i-eye" : "#i-eye-off");
        btn.setAttribute("aria-label", showing ? "Show password" : "Hide password");
      });
    });
  </script>
</body>
</html>
